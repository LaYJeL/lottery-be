server:
  port: 8088

logging:
  level:
    com.game.lottery: DEBUG

spring:
  application:
    name: lottery-service

  datasource:
    url: jdbc:postgresql://localhost:5434/lottery_db
    username: lottery_user
    password: lottery_password
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    liquibase-schema: public
    default-schema: lottery

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: lottery

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/lottery

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:lottery}
  resource: ${KEYCLOAK_RESOURCE:lottery-backend}
  credentials:
    secret: ${KEYCLOAK_CREDENTIALS_SECRET:2mbKmNZ67GfhsJQqwruPfF5qq99ZB8JQ}

# Application-specific configuration
app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
    allow-credentials: true

# Game balance configuration
game:
  balance:
    leveling-exponent: 1.5
    base-xp: 100
    max-level: 99
    verification-code-expiry-minutes: 5
    max-verification-attempts: 3