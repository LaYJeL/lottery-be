server:
  port: 8088

spring:
  application:
    name: lottery-service

  datasource:
    url: jdbc:postgresql://localhost:5434/lottery_db
    username: lottery_user
    password: lottery_password
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    liquibase-schema: public
    default-schema: lottery

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: lottery

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/lottery